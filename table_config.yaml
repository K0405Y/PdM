# PdM — Database Schema & Equipment Configuration
# Single source of truth for all table names, column names, and equipment metadata used by the API and ingestion layers. 
# Equipment type definitions


equipment_types:

  turbine:
    master:
      table: master_data.gas_turbines
      id_column: turbine_id
      insert_columns:
        - name
        - serial_number
        - location
        - installed_date
        - initial_health_hgp
        - initial_health_blade
        - initial_health_bearing
        - initial_health_fuel
      # DB column → simulator constructor kwarg (non-health, non-name params)
      constructor_params: {}

    telemetry:
      table: telemetry.gas_turbine_telemetry
      id_column: telemetry_id
      equipment_id_column: turbine_id
      health_columns:
        - health_hgp
        - health_blade
        - health_bearing
        - health_fuel
      key_numeric_columns:
        - speed_rpm
        - egt_celsius
        - vibration_rms_mm_s
        - efficiency_fraction
        - fuel_flow_kg_s
      # Simulator state key → DB column name (used by bulk_insert COPY)
      column_mappings:
        equipment_id: turbine_id
        sample_time: sample_time
        operating_hours: operating_hours
        speed: speed_rpm
        speed_target: speed_target_rpm
        exhaust_gas_temp: egt_celsius
        oil_temp: oil_temp_celsius
        fuel_flow: fuel_flow_kg_s
        compressor_discharge_temp: compressor_discharge_temp_celsius
        compressor_discharge_pressure: compressor_discharge_pressure_kpa
        efficiency: efficiency_fraction
        ambient_temp: ambient_temp_celsius
        ambient_pressure: ambient_pressure_kpa
        vibration_rms: vibration_rms_mm_s
        vibration_peak: vibration_peak_mm_s
        vibration_crest_factor: vibration_crest_factor
        vibration_kurtosis: vibration_kurtosis
        health_hgp: health_hgp
        health_blade: health_blade
        health_bearing: health_bearing
        health_fuel: health_fuel
        num_active_faults: num_active_faults
        total_faults_initiated: total_faults_initiated
        upset_active: upset_active
        upset_type: upset_type
        upset_severity: upset_severity

    failures:
      table: failure_events.gas_turbine_failures
      equipment_id_column: turbine_id
      insert_columns:
        - failure_time
        - operating_hours_at_failure
        - failure_mode_code
        - speed_rpm_at_failure
        - egt_celsius_at_failure
        - vibration_mm_s_at_failure
      # Maps simulator state keys to the equipment-specific failure snapshot columns
      state_key_mappings:
        - { state_key: speed, db_column: speed_rpm_at_failure }
        - { state_key: exhaust_gas_temp, db_column: egt_celsius_at_failure }
        - { state_key: vibration_rms, db_column: vibration_mm_s_at_failure }

    maintenance:
      table: maintenance_events.gas_turbine_maintenance
      equipment_id_column: turbine_id

    test_telemetry:
      table: test_data.gas_turbine_telemetry
    test_failure:
      table: test_data.gas_turbine_failures
    test_maintenance:
      table: test_data.gas_turbine_maintenance

  compressor:
    master:
      table: master_data.compressors
      id_column: compressor_id
      insert_columns:
        - name
        - serial_number
        - location
        - installed_date
        - design_flow_m3h
        - design_head_kj_kg
        - initial_health_impeller
        - initial_health_bearing
      constructor_params:
        design_flow_m3h: design_flow
        design_head_kj_kg: design_head

    telemetry:
      table: telemetry.compressor_telemetry
      id_column: telemetry_id
      equipment_id_column: compressor_id
      health_columns:
        - health_impeller
        - health_bearing
      key_numeric_columns:
        - speed_rpm
        - flow_m3h
        - surge_margin_percent
        - efficiency_fraction
        - orbit_amplitude_mm
      column_mappings:
        equipment_id: compressor_id
        sample_time: sample_time
        operating_hours: operating_hours
        speed: speed_rpm
        speed_target: speed_target_rpm
        flow: flow_m3h
        head: head_kj_kg
        efficiency: efficiency_fraction
        power: power_kw
        suction_pressure: suction_pressure_kpa
        suction_temp: suction_temp_celsius
        discharge_pressure: discharge_pressure_kpa
        discharge_temp: discharge_temp_celsius
        surge_margin: surge_margin_percent
        surge_alarm: surge_alarm
        orbit_amplitude: vibration_amplitude_mm
        sync_amplitude: sync_amplitude_mm
        shaft_x_displacement: shaft_x_displacement_mm
        shaft_y_displacement: shaft_y_displacement_mm
        bearing_temp_de: bearing_temp_de_celsius
        bearing_temp_nde: bearing_temp_nde_celsius
        thrust_bearing_temp: thrust_bearing_temp_celsius
        health_seal_primary: seal_health_primary
        health_seal_secondary: seal_health_secondary
        primary_seal_leakage: primary_seal_leakage_kg_s
        secondary_seal_leakage: secondary_seal_leakage_kg_s
        health_impeller: health_impeller
        health_bearing: health_bearing
        num_active_faults: num_active_faults
        total_faults_initiated: total_faults_initiated
        upset_active: upset_active
        upset_type: upset_type
        upset_severity: upset_severity

    failures:
      table: failure_events.compressor_failures
      equipment_id_column: compressor_id
      insert_columns:
        - failure_time
        - operating_hours_at_failure
        - failure_mode_code
        - speed_rpm_at_failure
        - surge_margin_at_failure
        - vibration_amplitude_at_failure
      state_key_mappings:
        - { state_key: speed, db_column: speed_rpm_at_failure }
        - { state_key: surge_margin, db_column: surge_margin_at_failure }
        - { state_key: orbit_amplitude, db_column: vibration_amplitude_at_failure }

    maintenance:
      table: maintenance_events.compressor_maintenance
      equipment_id_column: compressor_id

    test_telemetry:
      table: test_data.compressor_telemetry
    test_failure:
      table: test_data.compressor_failures
    test_maintenance:
      table: test_data.compressor_maintenance

  pump:
    master:
      table: master_data.pumps
      id_column: pump_id
      insert_columns:
        - name
        - serial_number
        - service_type
        - location
        - installed_date
        - design_flow_m3h
        - design_head_m
        - design_speed_rpm
        - fluid_density_kg_m3
        - npsh_available_m
        - initial_health_impeller
        - initial_health_seal
        - initial_health_bearing_de
        - initial_health_bearing_nde
      constructor_params:
        design_flow_m3h: design_flow
        design_head_m: design_head
        design_speed_rpm: design_speed
        fluid_density_kg_m3: fluid_density

    telemetry:
      table: telemetry.pump_telemetry
      id_column: telemetry_id
      equipment_id_column: pump_id
      health_columns:
        - health_impeller
        - health_seal
        - health_bearing_de
        - health_bearing_nde
      key_numeric_columns:
        - speed_rpm
        - flow_m3h
        - vibration_rms_mm_s
        - efficiency_fraction
        - cavitation_margin_m
      column_mappings:
        equipment_id: pump_id
        sample_time: sample_time
        operating_hours: operating_hours
        speed: speed_rpm
        speed_target: speed_target_rpm
        flow: flow_m3h
        head: head_m
        efficiency: efficiency_fraction
        power: power_kw
        suction_pressure: suction_pressure_kpa
        discharge_pressure: discharge_pressure_kpa
        fluid_temp: fluid_temp_celsius
        npsh_available: npsh_available_m
        npsh_required: npsh_required_m
        npsh_margin: cavitation_margin_m
        cavitation_severity: cavitation_severity
        vibration_rms: vibration_rms_mm_s
        vibration_peak: vibration_peak_mm_s
        bearing_temp_de: bearing_temp_de_celsius
        bearing_temp_nde: bearing_temp_nde_celsius
        motor_current: motor_current_amps
        motor_current_ratio: motor_current_ratio
        seal_leakage: seal_leakage_rate
        bep_deviation: bep_deviation_percent
        health_impeller: health_impeller
        health_seal: health_seal
        health_bearing_de: health_bearing_de
        health_bearing_nde: health_bearing_nde

    failures:
      table: failure_events.pump_failures
      equipment_id_column: pump_id
      insert_columns:
        - failure_time
        - operating_hours_at_failure
        - failure_mode_code
        - speed_rpm_at_failure
        - vibration_mm_s_at_failure
        - cavitation_margin_at_failure
      state_key_mappings:
        - { state_key: speed, db_column: speed_rpm_at_failure }
        - { state_key: vibration_rms, db_column: vibration_mm_s_at_failure }
        - { state_key: npsh_margin, db_column: cavitation_margin_at_failure }

    maintenance:
      table: maintenance_events.pump_maintenance
      equipment_id_column: pump_id

    test_telemetry:
      table: test_data.pump_telemetry
    test_failure:
      table: test_data.pump_failures
    test_maintenance:
      table: test_data.pump_maintenance


# Common columns present in every telemetry table
common_telemetry_columns:
  - telemetry_id
  - sample_time
  - operating_hours


# Maintenance event insert columns (common to all equipment types)
maintenance_insert_columns:
  - start_time
  - end_time
  - failure_code
  - downtime_hours
  - repaired_components


# Cumulative degradation features (computed per-equipment, used by health regressors)
cumulative_columns:
  - cummax_vibration_rms
  - cummax_vibration_peak
  - cum_efficiency_loss
  - lifecycle_position
  - cummax_egt
  - cum_fuel_flow_increase
  - cummin_efficiency


# Server-side derived columns (computed at query time, may evolve)
derived_columns:
  - operating_state
  # Trend features (7d, 14d, 30d)
  - vibration_trend_7d
  - vibration_trend_14d
  - vibration_trend_30d
  - efficiency_degradation_rate
  - efficiency_degradation_rate_14d
  - efficiency_degradation_rate_30d
  # Variation features (24h, 7d, 14d)
  - temp_variation_24h
  - temp_variation_7d
  - temp_variation_14d
  - speed_stability
  # Rolling min/max (24h, 7d, 14d)
  - vibration_max_24h
  - vibration_max_7d
  - vibration_max_14d
  - temp_max_24h
  - temp_max_7d
  - temp_max_14d
  - efficiency_min_7d
  - efficiency_min_14d
  - efficiency_min_30d
  # Delta (1st derivative)
  - vibration_delta
  - temp_delta
  - efficiency_delta
  # Acceleration (2nd derivative)
  - vibration_acceleration
  - temp_acceleration
  - efficiency_acceleration
  - vibration_trend_acceleration
  - efficiency_trend_acceleration
  # EWMA
  - vibration_ewma
  - temp_ewma
  # Ratios and interactions
  - pressure_ratio
  - load_factor
  - temp_vibration_ratio
  - efficiency_load_ratio
  - vibration_efficiency_ratio
  - temp_efficiency_ratio
  - vibration_temp_product
  - fuel_efficiency_ratio
  - vibration_speed_ratio
  - temp_fuel_ratio
  # Spectral features (FFT-based)
  - vibration_spectral_entropy
  - vibration_dominant_freq
  - vibration_spectral_centroid
  - temp_spectral_entropy
  - temp_dominant_freq
  - temp_spectral_centroid
  # Failure-mode-specific indicators
  - bearing_indicator
  - hgp_indicator
  - blade_indicator
  - fuel_indicator


# Internal simulator state fields
internal_state_fields:
  - operating_mode
  - thermal_stress
  - degradation_multiplier
  - differential_temp_C


# Feature engineering key mappings — maps equipment-specific telemetry keys
# to canonical names used by FeatureEngineer for derived feature computation.
feature_engineering:
  vibration_keys:
    - vibration_rms       # gas turbine, pump
    - orbit_amplitude     # compressor
  temperature_keys:
    - bearing_temp_de
    - bearing_temp_nde
    - fluid_temp
    - exhaust_gas_temp
    - oil_temp
    - discharge_temp
  speed_key: speed
  efficiency_key: efficiency
  pressure_keys:
    discharge: discharge_pressure
    suction: suction_pressure
  fuel_flow_key: fuel_flow
  load_keys:
    speed: speed
    speed_target: speed_target


# XGBoost model configuration
xgb_config:
  default_params:
    max_depth: 6
    learning_rate: 0.1
    n_estimators: 300
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 5
    tree_method: hist
    random_state: 42
    early_stopping_rounds: 20

  tuning_distributions:
    max_depth: [4, 5, 6, 7, 8, 9, 10, 12]
    learning_rate: [0.005, 0.01, 0.03, 0.05, 0.1, 0.2]
    n_estimators: [200, 300, 500, 700, 1000]
    subsample: [0.5, 0.6, 0.7, 0.8, 0.9]
    colsample_bytree: [0.5, 0.6, 0.7, 0.8, 0.9]
    min_child_weight: [1, 3, 5, 7, 10, 15]
    gamma: [0, 0.1, 0.3, 0.5, 1.0]
    reg_alpha: [0, 0.01, 0.1, 1.0]
    reg_lambda: [1.0, 2.0, 5.0, 10.0]


# Failure mode metadata — ML-relevant thresholds, indicators, lead times
failure_modes:

  gas_turbine:
    - mode_code: F_HGP
      description: "Hot Gas Path Degradation - Combustion liner cracking"
      failure_threshold: 0.45
      severity: safety_critical
      primary_indicators:
        - egt_celsius
        - efficiency_fraction
      lagging_indicators:
        - vibration_rms_mm_s
      typical_lead_time_hours: "2000-6000"

    - mode_code: F_BLADE
      description: "Blade Erosion - Leading edge degradation"
      failure_threshold: 0.40
      severity: safety_critical
      primary_indicators:
        - vibration_rms_mm_s
        - vibration_peak_mm_s
      lagging_indicators:
        - efficiency_fraction
      typical_lead_time_hours: "3000-8000"

    - mode_code: F_BEARING
      description: "Bearing Failure - Lubrication/mechanical degradation"
      failure_threshold: 0.35
      severity: safety_critical
      primary_indicators:
        - vibration_rms_mm_s
        - oil_temp_celsius
      lagging_indicators:
        - speed_rpm
      typical_lead_time_hours: "1000-4000"

    - mode_code: F_FUEL
      description: "Fuel System Fouling - Nozzle blockage"
      failure_threshold: 0.55
      severity: performance
      primary_indicators:
        - fuel_flow_kg_s
        - egt_celsius
      lagging_indicators:
        - efficiency_fraction
      typical_lead_time_hours: "2000-5000"

  compressor:
    - mode_code: F_IMPELLER
      description: "Impeller Degradation - Erosion or fouling"
      failure_threshold: 0.42
      severity: availability
      primary_indicators:
        - efficiency_fraction
        - head_kj_kg
      lagging_indicators:
        - vibration_amplitude_mm
        - power_kw
      typical_lead_time_hours: "2000-6000"

    - mode_code: F_BEARING
      description: "Bearing Failure - Journal or thrust bearing damage"
      failure_threshold: 0.38
      severity: safety_critical
      primary_indicators:
        - bearing_temp_de_celsius
        - bearing_temp_nde_celsius
        - orbit_amplitude_mm
      lagging_indicators:
        - thrust_bearing_temp_celsius
      typical_lead_time_hours: "1000-4000"

    - mode_code: F_SEAL_PRIMARY
      description: "Primary Dry Gas Seal Failure"
      failure_threshold: 0.25
      severity: safety_critical
      primary_indicators:
        - primary_seal_leakage_kg_s
        - seal_health_primary
      lagging_indicators:
        - discharge_pressure_kpa
      typical_lead_time_hours: "1500-5000"

    - mode_code: F_SEAL_SECONDARY
      description: "Secondary Dry Gas Seal Failure"
      failure_threshold: 0.25
      severity: availability
      primary_indicators:
        - secondary_seal_leakage_kg_s
        - seal_health_secondary
      lagging_indicators: []
      typical_lead_time_hours: "2000-6000"

    - mode_code: F_HIGH_VIBRATION
      description: "High Vibration Trip - Shaft orbit amplitude exceeded safety limits"
      failure_threshold: 0.0
      severity: safety_critical
      primary_indicators:
        - orbit_amplitude_mm
        - sync_amplitude_mm
      lagging_indicators:
        - bearing_temp_de_celsius
      typical_lead_time_hours: "100-500"

    - mode_code: F_SURGE
      description: "Compressor Surge - Anti-surge protection failure, flow reversal damage"
      failure_threshold: 0.0
      severity: safety_critical
      primary_indicators:
        - surge_margin_percent
        - flow_m3h
      lagging_indicators:
        - discharge_pressure_kpa
        - suction_pressure_kpa
      typical_lead_time_hours: "10-100"

  pump:
    - mode_code: F_IMPELLER
      description: "Impeller Degradation - Erosion, corrosion, or damage"
      failure_threshold: 0.35
      severity: availability
      primary_indicators:
        - efficiency_fraction
        - head_m
        - bep_deviation_percent
      lagging_indicators:
        - vibration_rms_mm_s
        - power_kw
      typical_lead_time_hours: "1500-5000"

    - mode_code: F_SEAL
      description: "Mechanical Seal Failure - Wear, thermal damage, or contamination"
      failure_threshold: 0.40
      severity: availability
      primary_indicators:
        - seal_leakage_rate
        - fluid_temp_celsius
      lagging_indicators:
        - vibration_rms_mm_s
      typical_lead_time_hours: "1000-3000"

    - mode_code: F_BEARING_DRIVE_END
      description: "Drive End Bearing Failure - Fatigue, lubrication, or contamination"
      failure_threshold: 0.28
      severity: safety_critical
      primary_indicators:
        - bearing_temp_de_celsius
        - vibration_rms_mm_s
      lagging_indicators:
        - motor_current_amps
      typical_lead_time_hours: "800-3000"

    - mode_code: F_BEARING_NON_DRIVE_END
      description: "Non-Drive End Bearing Failure"
      failure_threshold: 0.28
      severity: availability
      primary_indicators:
        - bearing_temp_nde_celsius
        - vibration_rms_mm_s
      lagging_indicators: []
      typical_lead_time_hours: "1000-4000"

    - mode_code: F_BEARING_OVERTEMP
      description: "Bearing Overtemperature - Excessive friction or cooling failure"
      failure_threshold: 0.0
      severity: safety_critical
      primary_indicators:
        - bearing_temp_de_celsius
        - bearing_temp_nde_celsius
      lagging_indicators:
        - vibration_rms_mm_s
      typical_lead_time_hours: "50-200"

    - mode_code: F_HIGH_VIBRATION
      description: "High Vibration Trip - Mechanical instability"
      failure_threshold: 0.0
      severity: safety_critical
      primary_indicators:
        - vibration_rms_mm_s
        - vibration_peak_mm_s
      lagging_indicators:
        - bearing_temp_de_celsius
      typical_lead_time_hours: "50-300"

    - mode_code: F_CAVITATION
      description: "Severe Cavitation - NPSH margin critical"
      failure_threshold: 0.0
      severity: availability
      primary_indicators:
        - cavitation_margin_m
        - npsh_available_m
        - npsh_required_m
      lagging_indicators:
        - vibration_rms_mm_s
        - efficiency_fraction
      typical_lead_time_hours: "100-500"

    - mode_code: F_MOTOR_OVERLOAD
      description: "Motor Overload - Excessive current draw"
      failure_threshold: 0.0
      severity: availability
      primary_indicators:
        - motor_current_amps
        - motor_current_ratio
      lagging_indicators:
        - power_kw
      typical_lead_time_hours: "10-100"